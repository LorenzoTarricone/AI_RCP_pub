name: AI_RCP_env

# Portable, cross-platform environment for the AI_RCP pipeline.
#
# This file lists only the direct dependencies of the project. Conda
# resolves the right platform-specific binaries on the host (macOS incl.
# Apple Silicon, Linux x86_64, Linux + NVIDIA GPU). For an exact pin of
# the environment used to produce the paper's results on the HPC cluster,
# see environment_hpc_linux_cuda.yaml (Linux + NVIDIA GPU only).
#
# Usage:
#   conda env create -f environment.yaml
#   conda activate AI_RCP_env
#
# CUDA on Linux: PyTorch from conda-forge ships with CUDA wheels by
# default on linux-64 when a CUDA driver is detected. To force a CPU
# build, replace `pytorch` below with `pytorch::pytorch=*=*cpu*`.
# To use DGL CUDA wheels, replace the `dglteam` channel with
# `dglteam/label/th24_cu124` (matching your PyTorch+CUDA version).

channels:
  - pytorch
  - dglteam
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - tqdm
  - joblib
  - pyyaml
  - h5py
  - networkx
  - sympy
  - plotly

  # setuptools<80 keeps the legacy `pkg_resources` module available — Auto3D
  # 2.3 (the latest on conda-forge) still imports it at module load time.
  - setuptools<80

  # Cheminformatics & computational chemistry
  - rdkit
  - openbabel
  - ase
  - auto3d
  - xtb
  - xtb-python
  - dftd4
  - tblite
  - simple-dftd3
  - wurlitzer
  # morfeus-ml is the upstream `morfeus` package from the Digital Chemistry
  # Laboratory, conda-packaged. The repo previously shipped morfeus as a
  # git submodule (now removed); installing from conda-forge is simpler
  # and avoids the empty-submodule pitfall.
  - morfeus-ml

  # Deep-learning / graph stack
  # On osx-arm64 conda-forge currently ships dgl 2.3 only; that build
  # imports `torchdata.datapipes`, which was removed in torchdata 0.8,
  # so torchdata is pinned to the last compatible series.
  - pytorch
  - dgl
  - torchdata<0.8
  - xgboost

  # NLP / transformer stack (used for ChemBERTa and tokenisers)
  # transformers is pinned to >=4.45,<5 because:
  #   - 5.x requires torch>=2.4, incompatible with conda-forge dgl 2.3 on osx-arm64
  #   - <4.45 still uses removed huggingface_hub APIs (HfFolder, Repository),
  #     which conda's modern huggingface_hub no longer exposes
  - transformers>=4.45,<5
  - tokenizers
  - huggingface_hub
  - safetensors
  - datasets

  # Numerical extras
  - numba
  - llvmlite

  # Experiment tracking & dev
  - wandb
  - jupyter
  - ipykernel

  # Pip-only packages (not available on conda-forge or only published on PyPI).
  #
  # NOTE: aimnet is intentionally NOT installed here. Both 0.0.1 and 0.1.1
  # transitively pin a `torch` wheel that overwrites the conda-installed
  # PyTorch in-place on macOS, producing an OpenMP runtime conflict
  # (`OMP: Error #15`, libomp.dylib loaded twice). aimnet is only needed
  # by utils/utils_auto3d.py for the AIMNet2-ASE calculator. If you need
  # it, install it after the env is created with --no-deps:
  #     pip install --no-deps aimnet==0.0.1
  - pip:
      - pulp
      - pytorch-ignite
      - omegaconf
